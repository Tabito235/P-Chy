<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P-Chy – Mis clases</title>
  <link rel="stylesheet" href="/Estilos/clasesadmn.css">
  <link rel="stylesheet" href="/Estilos/navbarStyles.css">
     <link rel="stylesheet" href="/Estilos/modalStyle.css"/>
</head>
<body>

<div th:replace="~{Administrador/navbar :: navbar}"></div>

<main>
  <h1>Mis clases</h1>
  <p class="subtitle">Busca, administra y entra a tus clases.</p>

  <!-- Alertas -->
  <div th:if="${param.ok}"       class="alerta alerta-ok">✓ Clase creada correctamente.</div>
  <div th:if="${param.eliminada}" class="alerta alerta-ok">✓ Clase eliminada.</div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="buscador" placeholder="Buscar por nombre de la clase..."/>
  </div>

  <!-- Sin clases -->
  <div th:if="${#lists.isEmpty(clases)}" class="empty-state">
    <p>Aún no tienes clases. <a href="/Administrador/Nueva/Clase">Crea tu primera clase</a>.</p>
  </div>

  <!-- Grid de clases -->
  <div class="grid" id="grid">
    <div class="card" th:each="clase : ${clases}" th:attr="data-nombre=${clase.nombre}">

      <div class="card-header">
        <div class="card-title-wrap">
          <div class="dot"></div>
          <span class="card-title" th:text="${clase.nombre}"></span>
        </div>

        <!-- Menú opciones -->
        <div class="menu-wrap">
          <button class="menu-btn" aria-label="Opciones">⋮</button>
          <div class="dropdown">

           <div class="dropdown-code">
  <div class="dropdown-code-label">Código de clase</div>
  <div class="dropdown-code-row">
    <span class="dropdown-code-val" th:text="${clase.codigo}"></span>
    <button class="copy-btn"
            th:data-codigo="${clase.codigo}"
            onclick="copyText(this.dataset.codigo, this)"
            title="Copiar código">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
    </button>
  </div>
</div>

<div class="dropdown-code">
  <div class="dropdown-code-label">URL de la clase</div>
  <div class="dropdown-code-row">
    <span class="dropdown-code-val"
          th:text="${baseUrl} + '/unirse/' + ${clase.codigo}"
          style="font-size:.82rem;font-weight:400">
    </span>
    <button class="copy-btn"
            th:data-url="${baseUrl} + '/unirse/' + ${clase.codigo}"
            onclick="copyText(this.dataset.url, this)"
            title="Copiar URL">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="9" y="9" width="13" height="13" rx="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
    </button>
  </div>
</div>
            <hr class="dropdown-divider"/>
            <a th:href="'/Administrador/Clase/' + ${clase.idClase}" class="dropdown-item">Entrar a la clase</a>
<div class="dropdown-item"
     th:data-id="${clase.idClase}"
     th:data-nombre="${clase.nombre}"
     th:data-descripcion="${clase.descripcion} ?: ''"
     onclick="abrirEditar(this.dataset.id, this.dataset.nombre, this.dataset.descripcion)">
  Editar clase
</div>


            <!-- Formulario de eliminación -->
            <form th:action="'/Administrador/Clase/' + ${clase.idClase} + '/Eliminar'"
                  method="post" style="display:inline"
                  onsubmit="return confirm('¿Eliminar esta clase? Esta acción no se puede deshacer.')">
              <button type="submit" class="dropdown-item danger">Borrar clase</button>
            </form>

          </div>
        </div>
      </div>

      <div class="card-meta">
        <span th:text="'Alumnos: ' + ${clase.totalAlumnos}"></span>
        <span th:if="${clase.totalCompetencias > 0}"
              th:text="'Competencias: ' + ${clase.totalCompetencias}"></span>
        <span th:if="${clase.totalCompetencias == 0}" class="sin-comp">
          Sin competencias asignadas
        </span>
      </div>

      <a class="btn-enter" th:href="'/Administrador/Clase/' + ${clase.idClase}">Entrar</a>

    </div>
  </div>
</main>

<!-- Modal editar clase -->
<div class="modal-overlay" id="modalEditar">
  <div class="modal-card">
    <h2 class="modal-titulo">Editar clase</h2>
    <form id="formEditar" method="post">

      <div class="campo-grupo">
        <label class="campo-label">Nombre</label>
        <input type="text" name="nombre" id="editNombre" class="campo-input" required>
      </div>
      <div class="campo-grupo">
        <label class="campo-label">Descripción</label>
        <textarea name="descripcion" id="editDescripcion" class="campo-textarea"></textarea>
      </div>

      <div class="modal-acciones">
        <button type="button" class="btn-modal-cancel"
                onclick="cerrarModalEditar()">Cancelar</button>
        <button type="submit" class="btn-modal-submit">Guardar cambios</button>
      </div>
    </form>
  </div>
</div>

<script src="/Funciones/clasesadmin.js"></script>

</body>
</html>
