<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title th:text="'P-Chy – ' + ${clase.nombre}">P-Chy – Clase</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Estilos/enclase.css"/>
  <link rel="stylesheet" href="/Estilos/navbarStyles.css"/>
  <link rel="stylesheet" href="/Estilos/comstyle.css"/>
   <link rel="stylesheet" href="/Estilos/modalStyle.css"/>


</head>
<body>

<div th:replace="~{Administrador/navbar :: navbar}"></div>

<div class="clase-header">
  <div class="clase-header-inner">
    <div class="clase-title-row">
      <div>
        <!-- Nombre dinámico -->
        <h1 class="clase-title" th:text="${clase.nombre}">Nombre clase</h1>
        <div class="clase-meta">
          <span>Código: <strong th:text="${clase.codigo}"></strong></span>
          <span class="sep">|</span>
          <span>Alumnos: <strong th:text="${clase.totalAlumnos}"></strong></span>
          <span class="sep">|</span>
          <span>Competencias: <strong th:text="${clase.totalCompetencias}"></strong></span>

<button class="meta-btn"
        th:data-codigo="${clase.codigo}"
        onclick="copyText(this.dataset.codigo, this)">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="9" y="9" width="13" height="13" rx="2"/>
    <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
  </svg>
  Copiar código
</button>

<button class="meta-btn"
        th:data-url="${baseUrl} + '/unirse/' + ${clase.codigo}"
        onclick="copyText(this.dataset.url, this)">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
  </svg>
  Copiar URL
</button>
        </div>
      </div>

      <!-- Botón editar abre modal con datos precargados -->
<button class="btn-editar"
        th:data-id="${clase.idClase}"
        th:data-nombre="${clase.nombre}"
        th:data-descripcion="${clase.descripcion} ?: ''"
        onclick="abrirEditarClase(this.dataset.id, this.dataset.nombre, this.dataset.descripcion)">
  Editar clase
</button>
    </div>

    <div class="tabs">
      <button class="tab" data-tab="alumnos">Alumnos</button>
      <button class="tab" data-tab="solicitudes">
        Solicitudes <span class="badge">0</span>
      </button>
      <button class="tab active" data-tab="competencias">Competencias</button>
    </div>
  </div>
</div>

<main class="clase-main">

  <!-- TAB: ALUMNOS -->
  <div id="tab-alumnos" class="tab-panel hidden">
    <div class="alumnos-layout">
      <div class="alumnos-left">
        <div class="panel-header">
          <h2>Alumnos inscritos</h2>
          <div class="search-wrap" style="max-width:220px;margin-bottom:0">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Buscar alumno..." id="searchAlumno"/>
          </div>
        </div>
        <div class="alumnos-grid" id="alumnosGrid"></div>
      </div>
      <div class="solicitudes-panel">
        <h2>Solicitudes pendientes</h2>
        <div class="solicitudes-list" id="solicitudesList"></div>
        <button class="ver-todas">Ver todas las solicitudes</button>
      </div>
    </div>
  </div>

  <!-- TAB: SOLICITUDES -->
  <div id="tab-solicitudes" class="tab-panel hidden">
    <div class="panel-card">
      <div class="panel-header"><h2>Todas las solicitudes</h2></div>
      <div class="solicitudes-full" id="solicitudesFull"></div>
    </div>
  </div>

  <!-- TAB: COMPETENCIAS -->
<!-- TAB: COMPETENCIAS -->
<div id="tab-competencias" class="tab-panel">
  <div class="comp-toolbar">
    <button class="btn-nueva-comp" id="btnNuevaComp">+ Nueva competencia</button>
  </div>

  <!-- Sin competencias -->
  <div th:if="${#lists.isEmpty(competencias)}"
       style="text-align:center;color:#94a3b8;padding:40px 0;font-size:14px">
    Aún no hay competencias en esta clase.
  </div>

  <!-- Grid de competencias -->
  <div class="grid" id="compGrid">
    <div class="card comp-card" th:each="comp : ${competencias}">
      <div class="comp-top">
        <span class="comp-title" th:text="${comp.nombre}"></span>
        <span class="lang-tag" th:text="${comp.lenguaje}"></span>
      </div>
      <div class="comp-date">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span th:text="${#dates.format(comp.fechaInicio, 'dd MMM yyyy, HH:mm')}"></span>
      </div>
      <span class="status-pill" th:text="${comp.estado}"
            th:classappend="${comp.estado == 'PUBLICADA'} ? 'activa' :
                            (${comp.estado == 'CERRADA'} ? 'cerrada' : 'borrador')">
      </span>
      <div class="comp-actions">
        <a class="btn-enter"
           th:href="'/Administrador/Clase/' + ${clase.idClase} +
                    '/Competencia/' + ${comp.idCompetencia}">
          Entrar
        </a>

        <!-- Publicar (solo si es BORRADOR) -->
        <form th:if="${comp.estado == 'BORRADOR'}"
              th:action="'/Administrador/Clase/' + ${clase.idClase} +
                         '/Competencia/' + ${comp.idCompetencia} + '/Publicar'"
              method="post" style="display:inline">
          <button type="submit" class="btn-outline">Publicar</button>
        </form>

        <!-- Eliminar -->
        <form th:action="'/Administrador/Clase/' + ${clase.idClase} +
                         '/Competencia/' + ${comp.idCompetencia} + '/Eliminar'"
              method="post" style="display:inline"
              onsubmit="return confirm('¿Eliminar esta competencia?')">
          <button type="submit" class="btn-outline danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>

</main>

<!-- MODAL — Nueva competencia -->
<!-- MODAL — Nueva competencia -->
<div class="modal-overlay" id="modalNuevaComp">
  <div class="modal-card">
    <h2 class="modal-titulo">Nueva competencia</h2>

    <form th:action="'/Administrador/Clase/' + ${clase.idClase} + '/Competencia/Nueva'"
          method="post" id="formNuevaComp">

      <div class="m-campo" id="mCampoNombre">
        <label class="m-label">Nombre</label>
        <input class="m-input" name="nombre" type="text"
               placeholder="Ej. Bucles en Python" required>
        <span class="m-error-msg">El nombre es obligatorio.</span>
      </div>

      <div class="m-campo" id="mCampoLenguaje">
        <label class="m-label">Lenguaje</label>
        <select class="m-select" name="lenguaje" required>
          <option value="">Seleccionar lenguaje</option>
          <option value="Python">Python</option>
          <option value="C++">C++</option>
        </select>
        <span class="m-error-msg">Selecciona un lenguaje.</span>
      </div>

      <div class="m-campo">
        <label class="m-label">Descripción (opcional)</label>
        <textarea class="m-input" name="descripcion"
                  placeholder="Descripción de la competencia..."
                  style="resize:vertical;min-height:60px"></textarea>
      </div>

      <div class="m-campo" id="mCampoFecha">
        <label class="m-label">Fecha y hora de inicio</label>
        <input class="m-input" name="fechaInicio" type="datetime-local" required>
        <span class="m-error-msg">La fecha de inicio es obligatoria.</span>
      </div>

      <div class="m-campo">
        <label class="m-label">Fecha y hora de fin</label>
        <input class="m-input" name="fechaFin" type="datetime-local" required>
      </div>

      <div class="modal-acciones">
        <button type="button" class="btn-modal-cancel"
                onclick="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-modal-submit">Crear competencia</button>
      </div>

    </form>
  </div>
</div>

<!-- Modal editar clase -->
<div class="modal-overlay" id="modalEditarClase">
  <div class="modal-card">
    <h2 class="modal-titulo">Editar clase</h2>
    <form id="formEditarClase" method="post">

      <div class="m-campo">
        <label class="m-label">Nombre</label>
        <input type="text" name="nombre" id="editClaseNombre" class="m-input" required>
      </div>
      <div class="m-campo">
        <label class="m-label">Descripción</label>
        <textarea name="descripcion" id="editClaseDesc" class="m-input"
                  style="resize:vertical;min-height:80px"></textarea>
      </div>

      <div class="modal-acciones">
        <button type="button" class="btn-modal-cancel"
                onclick="cerrarEditarClase()">Cancelar</button>
        <button type="submit" class="btn-modal-submit">Guardar cambios</button>
      </div>
    </form>
  </div>
</div>
<script src="/Funciones/modalCompetencia.js"></script>
</body>
</html>
