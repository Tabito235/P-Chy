<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'P-Chy – ' + ${nivel.titulo}">P-Chy – Nivel</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Estilos/enclase.css"/>
  <link rel="stylesheet" href="/Estilos/navbarStyles.css"/>
  <link rel="stylesheet" href="/Estilos/comstyle.css"/>
  <link rel="stylesheet" href="/Estilos/modalStyle.css"/>
</head>
<body>

<div th:replace="~{Administrador/navbar :: navbar}"></div>

<div class="clase-header">
  <div class="clase-header-inner">
    <div class="clase-title-row">
      <div>
        <h1 class="clase-title" th:text="${clase.nombre}">Clase</h1>
        <div class="clase-meta">
          <span th:text="'Competencia: ' + ${competencia.nombre}"></span>
        </div>
      </div>
      <a class="btn-editar"
         th:href="'/Administrador/Clase/' + ${clase.idClase} +
                  '/Competencia/' + ${competencia.idCompetencia}">
        Volver
      </a>
    </div>
  </div>
</div>



<main class="comp-main">

  <!-- Breadcrumb -->
  <nav class="breadcrumb">
    <a th:href="'/Administrador/Clase/' + ${clase.idClase}">
      <span th:text="${clase.nombre}"></span>
    </a>
    <span class="breadcrumb-sep">/</span>
    <a th:href="'/Administrador/Clase/' + ${clase.idClase} +
                '/Competencia/' + ${competencia.idCompetencia}"
       th:text="${competencia.nombre}"></a>
    <span class="breadcrumb-sep">/</span>
    <span th:text="${nivel.titulo}"></span>
  </nav>

  <!-- Alertas -->
  <div th:if="${param.ok}"        class="alerta alerta-ok">✓ Nivel actualizado.</div>
  <div th:if="${param.error}"     class="alerta alerta-error">✗ Error al guardar.</div>
  <div th:if="${param.casoError}" class="alerta alerta-error">✗ Error al agregar caso.</div>

  <div class="editar-layout">

<!-- Panel izquierdo: info del nivel -->
<div class="panel-niveles">
  <h2 th:text="${nivel.titulo}"></h2>
  <div style="font-size:13px;color:#6B6B80;margin-bottom:1rem">
    <span th:text="${nivel.tiempoLimite} + ' min'"></span> ·
    <span th:text="'Requiere ' + ${nivel.problemasParaDesbloquear} + ' problemas para desbloquear'"></span>
  </div>

  

  <!-- Form editar nivel -->
  <form th:action="'/Administrador/Clase/' + ${clase.idClase} +
                   '/Competencia/' + ${competencia.idCompetencia} +
                   '/Nivel/' + ${nivel.idNivel} + '/Editar'"
        method="post">

    <div class="m-campo">
      <label class="m-label">Título del nivel</label>
      <input type="text" name="titulo" class="m-input"
             th:value="${nivel.titulo}" required>
    </div>
    <div class="m-campo">
      <label class="m-label">Tiempo límite (min)</label>
      <input type="number" name="tiempoLimite" class="m-input"
             th:value="${nivel.tiempoLimite}" min="1" required>
    </div>
    <div class="m-campo">
      <label class="m-label">Problemas para desbloquear siguiente nivel</label>
      <input type="number" name="problemasParaDesbloquear" class="m-input"
             th:value="${nivel.problemasParaDesbloquear}" min="1" required>
    </div>

    <button type="submit" class="btn-modal-submit"
            style="width:100%;margin-top:8px">
      Guardar nivel
    </button>
  </form>
</div>



<!-- Panel derecho: lista de problemas -->
<div class="panel-problemas">
  <div class="panel-prob-header">
  <div>
    <div class="panel-prob-titulo">Problemas</div>
    <div class="panel-prob-tiempo"
         th:text="'Requiere ' + ${nivel.problemasParaDesbloquear} +
                  ' de ' + ${#lists.size(problemas)} + ' para desbloquear'">
    </div>
  </div>
  <button class="btn-add-problema"
          onclick="document.getElementById('modalNuevoProblema').classList.add('visible')">
    + Añadir problema
  </button>
</div>

<!-- Indicador -->
<div class="info-casos-prueba">
  💡 Haz clic en el <strong>nombre de un problema</strong> para administrar sus casos de prueba.
</div>

  <!-- Sin problemas -->
  <div th:if="${#lists.isEmpty(problemas)}"
       style="text-align:center;color:#94a3b8;padding:40px 0;font-size:14px">
    Aún no hay problemas en este nivel.
  </div>

  <!-- Lista de problemas -->
  <div th:each="prob : ${problemas}" class="problema-card">
    <div class="prob-header">
      <!-- Reemplaza el span del título por un link -->
<a class="prob-titulo"
   th:href="'/Administrador/Clase/' + ${clase.idClase} +
            '/Competencia/' + ${competencia.idCompetencia} +
            '/Nivel/' + ${nivel.idNivel} +
            '/Problema/' + ${prob.idProblema}"
   th:text="${prob.titulo}"
   style="text-decoration:none;color:inherit">
</a>
      <div style="display:flex;gap:6px">
        <button class="btn-del-nivel"
                th:data-id="${prob.idProblema}"
                th:data-titulo="${prob.titulo}"
                th:data-enunciado="${prob.enunciado}"
                th:data-puntaje="${prob.puntaje}"
                onclick="abrirEditarProblema(this)"
                title="Editar">✏️</button>
        <form th:action="'/Administrador/Clase/' + ${clase.idClase} +
                         '/Competencia/' + ${competencia.idCompetencia} +
                         '/Nivel/' + ${nivel.idNivel} +
                         '/Problema/' + ${prob.idProblema} + '/Eliminar'"
              method="post" style="display:inline"
              onsubmit="return confirm('¿Eliminar este problema?')">
          <button type="submit" class="btn-del-nivel" title="Eliminar">✕</button>
        </form>
      </div>
    </div>
    <div style="font-size:13px;color:#6B6B80;margin-top:8px;white-space:pre-line"
         th:text="${prob.enunciado}"></div>
    <div style="font-size:12px;color:#1646a9;margin-top:6px"
         th:text="${prob.puntaje} + ' pts'"></div>
  </div>
</div>

<!-- Modal nuevo problema -->
<div class="modal-overlay" id="modalNuevoProblema">
  <div class="modal-card">
    <h2 class="modal-titulo">Nuevo problema</h2>
    <form th:action="'/Administrador/Clase/' + ${clase.idClase} +
                     '/Competencia/' + ${competencia.idCompetencia} +
                     '/Nivel/' + ${nivel.idNivel} + '/Problema/Nuevo'"
          method="post">

      <div class="m-campo">
        <label class="m-label">Título</label>
        <input type="text" name="titulo" class="m-input"
               placeholder="Ej. Suma de arreglos" required>
      </div>
      <div class="m-campo">
        <label class="m-label">Enunciado</label>
        <textarea name="enunciado" class="m-input"
                  style="resize:vertical;min-height:100px"
                  placeholder="Describe el problema..."></textarea>
      </div>
      <div class="m-campo">
        <label class="m-label">Puntaje</label>
        <input type="number" name="puntaje" class="m-input"
               value="0" min="0">
      </div>

      <div class="modal-acciones">
        <button type="button" class="btn-modal-cancel"
                onclick="document.getElementById('modalNuevoProblema').classList.remove('visible')">
          Cancelar
        </button>
        <button type="submit" class="btn-modal-submit">Crear problema</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal editar problema -->
<div class="modal-overlay" id="modalEditarProblema">
  <div class="modal-card">
    <h2 class="modal-titulo">Editar problema</h2>
    <form id="formEditarProblema" method="post">

      <div class="m-campo">
        <label class="m-label">Título</label>
        <input type="text" name="titulo" id="editProbTitulo"
               class="m-input" required>
      </div>
      <div class="m-campo">
        <label class="m-label">Enunciado</label>
        <textarea name="enunciado" id="editProbEnunciado"
                  class="m-input" style="resize:vertical;min-height:100px"></textarea>
      </div>
      <div class="m-campo">
        <label class="m-label">Puntaje</label>
        <input type="number" name="puntaje" id="editProbPuntaje"
               class="m-input" min="0">
      </div>

      <div class="modal-acciones">
        <button type="button" class="btn-modal-cancel"
                onclick="document.getElementById('modalEditarProblema').classList.remove('visible')">
          Cancelar
        </button>
        <button type="submit" class="btn-modal-submit">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
  function abrirEditarProblema(btn) {
    const id       = btn.dataset.id;
    const titulo   = btn.dataset.titulo;
    const enunciado= btn.dataset.enunciado;
    const puntaje  = btn.dataset.puntaje;
    const idClase  = /*[[${clase.idClase}]]*/ 0;
    const idComp   = /*[[${competencia.idCompetencia}]]*/ 0;
    const idNivel  = /*[[${nivel.idNivel}]]*/ 0;

    document.getElementById('editProbTitulo').value   = titulo;
    document.getElementById('editProbEnunciado').value = enunciado;
    document.getElementById('editProbPuntaje').value  = puntaje;
    document.getElementById('formEditarProblema').action =
      `/Administrador/Clase/${idClase}/Competencia/${idComp}/Nivel/${idNivel}/Problema/${id}/Editar`;

    document.getElementById('modalEditarProblema').classList.add('visible');
  }

  // Cerrar modales al click fuera
  ['modalNuevoProblema','modalEditarProblema','modalNuevoNivel','modalEditarNivel']
    .forEach(id => {
      document.getElementById(id)?.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('visible');
      });
    });
</script>

</body>
</html>
