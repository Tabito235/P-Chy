<nav th:fragment="navbar" class="navbar">

    <div class="navbar-logo">
      <img src="/Imagenes/Pichy.png" alt="Mascota P-Chy" class="logo-mascota">
      <span class="logo-nombre">P-Chy</span>
    </div>

    <ul class="navbar-links">
      <li><a href="/Administrador/Inicio">Inicio</a></li>
      <li><a href="/Administrador/Nueva/Clase">Crear clase</a></li>
      <li><a href="/Administrador/Clases">Mis clases</a></li>
      <li><a href="/Administrador/Usuarios">Usuarios</a></li>
      <li><a href="/ayudaProfesor">Ayuda</a></li>
      <li><a href="/Perfil">Perfil</a></li>
    </ul>

    <div class="navbar-acciones">
      <button class="btn-notif" aria-label="Notificaciones">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
      </button>

      <a href="/Perfil" class="navbar-usuario">

        <!-- Con foto -->
        <div class="avatar"
             th:if="${usuario != null and usuario.fotoPerfil != null}"
             th:style="'background-image: url(' + ${usuario.fotoPerfil} + '); background-size: cover; background-position: center;'">
        </div>

        <!-- Sin foto: iniciales -->
        <div class="avatar avatar-iniciales-nav"
             th:if="${usuario == null or usuario.fotoPerfil == null}"
             th:text="${usuario != null} ? ${usuario.nombre?.substring(0,1)} + ${usuario.apellido?.substring(0,1)} : '?'">
        </div>

        <!-- Nombre -->
        <span class="navbar-nombre"
              th:text="${usuario != null} ? ${usuario.nombre} : 'Usuario'">
        </span>

      </a>
    </div>
</nav>
