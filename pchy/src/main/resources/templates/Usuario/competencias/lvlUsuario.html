<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'P-Chy – ' + ${nivel.titulo}">P-Chy – Nivel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Estilos/enclase.css"/>
  <link rel="stylesheet" href="/Estilos/navbarStyles.css"/>
  <link rel="stylesheet" href="/Estilos/usuario.css"/>
    <link rel="stylesheet" href="/Estilos/extra.css"/>
</head>
<body>

<div th:replace="~{Usuario/navbar :: navbar}"></div>

<main class="u-main">

  <!-- BREADCRUMB -->
  <nav class="breadcrumb">
    <a href="/Alumno/Mis/Clases">Clases</a>
    <span class="breadcrumb-sep">/</span>
    <a th:href="'/Alumno/Clase/' + ${clase.idClase}"
       th:text="${clase.nombre}"></a>
    <span class="breadcrumb-sep">/</span>
    <a th:href="'/Alumno/Clase/' + ${clase.idClase} +
                '/Competencia/' + ${competencia.idCompetencia}"
       th:text="${competencia.nombre}"></a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-actual" th:text="${nivel.titulo}"></span>
  </nav>

  <!-- HERO -->
  <div class="nivel-hero" style="margin:-1.6rem -2rem 1.4rem">
    <div class="nivel-hero-inner">
      <div class="nivel-hero-title">
        <span th:text="${nivel.titulo}"></span>
        <span class="tag tag-active" style="font-size:.75rem">En curso</span>
      </div>
      <div class="nivel-hero-actions">
        <a class="btn-secondary"
           th:href="'/Alumno/Clase/' + ${clase.idClase} +
                    '/Competencia/' + ${competencia.idCompetencia}">
          Volver a niveles
        </a>
      </div>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="nivel-stats">
    <div class="nivel-stat">
      <span class="nivel-stat-label">Tiempo del nivel</span>
      <span class="nivel-stat-val" th:text="${nivel.tiempoLimite} + ' min'"></span>
    </div>
    <div class="nivel-stat">
      <span class="nivel-stat-label">Problemas en este nivel</span>
      <span class="nivel-stat-val" th:text="${#lists.size(problemas)}"></span>
    </div>
    <div class="nivel-stat">
      <span class="nivel-stat-label">Debes completar</span>
      <span class="nivel-stat-val"
            th:text="${nivel.problemasParaDesbloquear} + ' para avanzar'"></span>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="u-layout">

    <!-- LISTA DE PROBLEMAS -->
    <div>

      <div th:if="${#lists.isEmpty(problemas)}"
           style="text-align:center;padding:40px;color:#94a3b8">
        Este nivel aún no tiene problemas.
      </div>

      <div class="prob-list">
        <a class="prob-item"
           th:each="prob : ${problemas}"
           th:href="'/Alumno/Clase/' + ${clase.idClase} +
                    '/Competencia/' + ${competencia.idCompetencia} +
                    '/Nivel/' + ${nivel.idNivel} +
                    '/Problema/' + ${prob.idProblema}"
           style="text-decoration:none;color:inherit">

          <div class="prob-icon">📄</div>

          <div class="prob-item-left">
            <div>
              <div class="prob-info-nombre" th:text="${prob.titulo}"></div>
              <div class="prob-info-pts">
                <span th:text="${prob.puntaje} + ' pts'"></span>
              </div>
            </div>
          </div>

          <span class="prob-estado pendiente">Pendiente</span>

          <button class="btn-resolver">Resolver</button>
        </a>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="u-sidebar">

      <div class="sidebar-card">
        <h3>Checklist del nivel</h3>
        <div class="checklist-item">
          <span class="checklist-label">Problemas para avanzar</span>
          <span class="checklist-val"
                th:text="'0/' + ${nivel.problemasParaDesbloquear}"></span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="sidebar-card">
        <h3>💡 Consejo de Pichy</h3>
        <p class="pichy-tip">
          Necesitas completar
          <strong th:text="${nivel.problemasParaDesbloquear}"></strong>
          problema(s) de este nivel para desbloquear el siguiente.
        </p>
      </div>

    </div>
  </div>
</main>
</body>
</html>
