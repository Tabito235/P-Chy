<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="'P-Chy – ' + ${competencia.nombre}">P-Chy – Competencia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Estilos/enclase.css"/>
  <link rel="stylesheet" href="/Estilos/navbarStyles.css"/>
  <link rel="stylesheet" href="/Estilos/usuario.css"/>
    <link rel="stylesheet" href="/Estilos/extra.css"/>
</head>
<body>

<div th:replace="~{Usuario/navbar :: navbar}"></div>

<main class="u-main">

  <!-- BREADCRUMB -->
  <nav class="breadcrumb">
    <a href="/Alumno/Mis/Clases">Clases</a>
    <span class="breadcrumb-sep">/</span>
    <a th:href="'/Alumno/Clase/' + ${clase.idClase}"
       th:text="${clase.nombre}"></a>
    <span class="breadcrumb-sep">/</span>
    <span class="breadcrumb-actual" th:text="${competencia.nombre}"></span>
  </nav>

  <!-- HERO -->
  <div class="comp-hero" style="margin:-1.6rem -2rem 1.4rem;padding:1.2rem 2rem 0;">
    <div class="comp-hero-top">
      <div>
        <div class="comp-hero-title">
          <span th:text="${competencia.nombre}"></span>
          <span class="tag tag-python" th:text="${competencia.lenguaje}"></span>
          <span class="tag tag-active" th:text="${competencia.estado}"></span>
        </div>
        <div class="comp-hero-meta">
          <span>
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
            </svg>
            Inicio: <span th:text="${#dates.format(competencia.fechaInicio,'dd MMM yyyy, HH:mm')}"></span>
          </span>
          <span>
            <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
            </svg>
            Fin: <span th:text="${#dates.format(competencia.fechaFin,'dd MMM yyyy, HH:mm')}"></span>
          </span>
        </div>
      </div>
      <div class="comp-hero-actions">
        <a class="btn-secondary"
           th:href="'/Alumno/Clase/' + ${clase.idClase}">
          Volver a clase
        </a>
      </div>
    </div>
    <div style="height:8px"></div>
  </div>

  <!-- LAYOUT -->
  <div class="u-layout">

    <!-- NIVELES -->
    <div>
      <h2 style="font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.9rem;">
        Niveles
      </h2>

      <div th:if="${#lists.isEmpty(niveles)}"
           style="text-align:center;padding:40px;color:#94a3b8">
        Esta competencia aún no tiene niveles.
      </div>

      <div class="niveles-list">
        <div class="nivel-row" th:each="nivel, stat : ${niveles}">
          <div class="nivel-row-header">
            <div class="nivel-row-left">
              <span class="nivel-row-nombre" th:text="${nivel.titulo}"></span>
              <span class="nivel-row-meta">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span th:text="${nivel.tiempoLimite} + ' min'"></span>
              </span>
              <span class="nivel-row-meta"
                    th:text="'Completar ' + ${nivel.problemasParaDesbloquear} + ' problemas para desbloquear'">
              </span>
            </div>
            <a class="btn-entrar-nivel"
               th:href="'/Alumno/Clase/' + ${clase.idClase} +
                        '/Competencia/' + ${competencia.idCompetencia} +
                        '/Nivel/' + ${nivel.idNivel}">
              Entrar
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="u-sidebar">
      <div class="sidebar-card">
        <h3>Reglas rápidas</h3>
        <div class="regla-item"
             th:each="nivel : ${niveles}"
             th:text="'• ' + ${nivel.titulo} + ': completar ' + ${nivel.problemasParaDesbloquear} + ' problema(s) para avanzar'">
        </div>
      </div>
    </div>

  </div>
</main>
</body>
</html>
