<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'P-Chy - ' + ${clase.nombre}">P-Chy - Clase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/Estilos/styles.css"/>
  <link rel="stylesheet" href="/Estilos/navbarStyles.css"/>
  <link rel="stylesheet" href="/Estilos/usuario.css"/>
  <link rel="stylesheet" href="/Estilos/pichy.css"/>
</head>
<body>

<div th:replace="~{Usuario/navbar :: navbar}"></div>
 <div th:replace="~{pchy/pichy :: pichy}"></div>

<main class="contenido">
  <div class="competencias-layout">

    <div class="competencias-columna-principal">

      <!-- Nombre de la clase -->
      <h1 th:text="${clase.nombre}">Clase</h1>

      <div class="competencias-header">
        <div class="clase-meta-info">
          <span class="meta-item" th:if="${clase.nombreProfesor != null}">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="20"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4z"/>
              <path d="M12 14c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <strong th:text="'Profesor: ' + ${clase.nombreProfesor}"></strong>
          </span>
          <span class="meta-item">
            <strong>Código: </strong>
            <span th:text="${clase.codigo}"></span>
          </span>
          <span class="meta-separador">|</span>
          <span class="meta-item">
            Alumnos: <strong th:text="${clase.totalAlumnos}"></strong>
          </span>
        </div>
      </div>

      <!-- Sin competencias -->
      <div th:if="${#lists.isEmpty(competencias)}"
           style="text-align:center;padding:40px;color:#94a3b8">
        No hay competencias activas en esta clase por ahora.
      </div>

      <!-- Lista de competencias -->
      <div class="competencias-lista">
        <div class="competencia-card" th:each="comp : ${competencias}">
          <div class="competencia-header">
            <div class="competencia-titulo">
              <div class="competencia-icono activa"></div>
              <h3 th:text="${comp.nombre}"></h3>
            </div>
          </div>

          <div class="competencia-estado">
            <span class="estado-badge activo" th:text="${comp.estado}"></span>
          </div>

          <div class="competencia-niveles">
            <div class="nivel-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <span class="nivel-nombre">Inicio:</span>
              <span class="nivel-duracion"
                    th:text="${#dates.format(comp.fechaInicio,'dd MMM yyyy, HH:mm')}">
              </span>
            </div>
            <div class="nivel-item">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                   fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              <span class="nivel-nombre">Fin:</span>
              <span class="nivel-duracion"
                    th:text="${#dates.format(comp.fechaFin,'dd MMM yyyy, HH:mm')}">
              </span>
            </div>
          </div>

          <div class="competencia-acciones">
            <a class="btn-entrar-competencia"
               th:href="'/Alumno/Clase/' + ${clase.idClase} +
                        '/Competencia/' + ${comp.idCompetencia}">
              Entrar
            </a>
          </div>
        </div>
      </div>

    </div>

    <!-- Barra lateral -->
    <div class="competencias-columna-lateral">
      <div class="ayuda-card">
        <h3 class="ayuda-titulo">Tu progreso en esta clase</h3>
        <ul class="ayuda-lista">
          <li><span class="meta-item">Puntos acumulados: <strong>—</strong></span></li>
          <li><span class="meta-item">Competencias participadas: <strong>—</strong></span></li>
        </ul>
      </div>

      <div class="ayuda-card" style="margin-top:16px">
        <h3 class="ayuda-titulo">Ayuda rápida</h3>
        <ul class="ayuda-lista">
          <li>
            <a href="#">Cómo funciona una competencia</a>
          </li>
          <li>
            <a href="#">Cómo subir tu txt y captura</a>
          </li>
        </ul>
      </div>
    </div>

  </div>
</main>

</body>
</html>
