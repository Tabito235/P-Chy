<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>P-Chy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/Estilos/stylesPrincipalUsuario.css">
  <link rel="stylesheet" href="/Estilos/pichy.css">
  <link rel="stylesheet" href="/Estilos/navbarStyles.css">
</head>
<body>

<div th:replace="~{Usuario/navbar :: navbar}"></div>
<div th:replace="~{pchy/pichy :: pichy}"></div>

<main class="main">

  <!-- Bienvenida -->
<section class="welcome-card card">
  <div class="welcome-text">
    <h1 class="welcome-name"
        th:text="'Hola, ' + ${usuario.nombre}">Hola</h1>
    <p class="welcome-sub">Listo para competir hoy en C++ y Python.</p>
  </div>
  <div class="bienvenida-img">
    <!-- Imagen dinámica según institución -->
    <img th:src="${imagenInstitucion}"
         alt="Institución" class="bienvenida-img">
  </div>
</section>

  <!-- Resumen -->
  <section class="section">
    <h2 class="section-title">Resumen rápido</h2>
    <div class="stats-grid">

      <div class="stat-card card">
        <div class="stat-info">
          <span class="stat-label">Clases activas</span>
          <span class="stat-value" th:text="${totalClases}">0</span>
        </div>
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="20" height="12" rx="1"/>
            <circle cx="12" cy="6" r="1.5"/>
            <path stroke-linecap="round" d="M9 11c0-1.657 1.343-2 3-2s3 .343 3 2"/>
            <circle cx="6" cy="19" r="1.5"/>
            <circle cx="12" cy="19" r="1.5"/>
            <circle cx="18" cy="19" r="1.5"/>
            <path stroke-linecap="round" d="M3.5 23c0-1.381 1.119-2 2.5-2s2.5.619 2.5 2"/>
            <path stroke-linecap="round" d="M9.5 23c0-1.381 1.119-2 2.5-2s2.5.619 2.5 2"/>
            <path stroke-linecap="round" d="M15.5 23c0-1.381 1.119-2 2.5-2s2.5.619 2.5 2"/>
          </svg>
        </div>
      </div>

      <div class="stat-card card">
        <div class="stat-info">
          <span class="stat-label">Competencias próximas</span>
          <span class="stat-value"
                th:text="${#lists.size(competenciasProximas)}">0</span>
        </div>
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none"
               viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872"/>
          </svg>
        </div>
      </div>

      <div class="stat-card card">
        <div class="stat-info">
          <span class="stat-label">Puntos totales</span>
          <span class="stat-value"
                th:text="${usuario.puntaje}">0</span>
        </div>
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" fill="none"
               viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.562.562 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.562.562 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5Z"/>
          </svg>
        </div>
      </div>

    </div>
  </section>

  <!-- Competencias próximas -->
  <div class="two-col">

    <div class="competition-card card">
      <div class="comp-header">
        <div>
          <p class="comp-label">Próximas competencias</p>

          <!-- Sin competencias -->
          <div th:if="${#lists.isEmpty(competenciasProximas)}"
               style="font-size:13px;color:#94a3b8;margin-top:8px">
            No hay competencias próximas.
          </div>

          <!-- Con competencias -->
          <div th:each="comp, stat : ${competenciasProximas}"
               th:if="${stat.index < 1}">
            <h3 class="comp-title" th:text="${comp.nombre}"></h3>
            <div class="comp-meta">
              <span class="comp-date">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                <span th:text="${#dates.format(comp.fechaInicio,'dd MMM yyyy, HH:mm')}"></span>
              </span>
            </div>
            <a class="btn-enter"
               th:href="'/Alumno/Clase/' + ${comp.idClase} + '/Competencia/' + ${comp.idCompetencia}">
              Entrar
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Ir a mis clases -->
    <div class="activity-card card">
      <h3 class="activity-title">Acciones rápidas</h3>
      <ul class="activity-list">
        <li class="activity-item">
          <a href="/Alumno/Mis/Clases"
             style="color:#1646a9;font-weight:600;text-decoration:none">
            Ver mis clases
          </a>
        </li>
        <li class="activity-item">
         <!-- <a href="/Alumno/Rankings"
             style="color:#1646a9;font-weight:600;text-decoration:none">
              Ver rankings -->
          </a>
        </li>
        <li class="activity-item">
          <a href="/Perfil"
             style="color:#1646a9;font-weight:600;text-decoration:none">
            Ver mi perfil
          </a>
        </li>
      </ul>
    </div>

  </div>

  <div class="onboarding-acciones">
    <a href="/Login" class="btn-omitir">Cerrar sesión</a>
  </div>

</main>
</body>
</html>
