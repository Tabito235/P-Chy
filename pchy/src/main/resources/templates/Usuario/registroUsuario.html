<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/Estilos/login.css">
<link rel="stylesheet" href="/Estilos/navbarStyles.css">

<title>P-Chy Registro</title>
</head>

<body>

<nav class="navbar">
  <div class="navbar-logo">
    <img src="/Imagenes/Pichy.png" class="logo-mascota">
    <span class="logo-nombre">P-Chy</span>
  </div>
</nav>

<main class="auth-page">

<section class="formulario">

<img src="/Imagenes/Pichy.png" class="formulario-mascota">

<h1 class="formulario-titulo">Registro</h1>

<p class="formulario-subtitulo">
Ingresa tus datos para registrarte
</p>

<form action="/Usuario/Registro" method="post">

<div class="campo-grupo">
<label class="campo-label">Nombre</label>
<input type="text"
       name="nombre"
       class="campo-input"
       required>
</div>

<div class="campo-grupo">
<label class="campo-label">Apellido paterno</label>
<input type="text"
       name="apellido"
       class="campo-input"
       required>
</div>

<div class="campo-grupo">
<label class="campo-label">Correo electrónico</label>
<input type="email"
       name="correo"
       class="campo-input"
       required>
</div>

<div class="campo-grupo">
<label class="campo-label">Boleta / Matrícula</label>
<input type="text"
       name="matricula"
       class="campo-input"
       required>
</div>

<div class="campo-grupo">
<label class="campo-label">Contraseña</label>
<input type="password"
       name="contrasena"
       class="campo-input"
       required>
</div>

<div class="campo-grupo">
<label class="campo-label">Escuela</label>

<div class="campo-select-wrap">
<select name="institucion"
        class="campo-select"
        required>

<option value="" disabled selected>
Escuela de procedencia
</option>

<option value="UPIIZ">UPIIZ</option>
<option value="ESCOM">ESCOM</option>
<option value="UPIITA">UPIITA</option>
<option value="ESIME">ESIME</option>
<option value="UPIIP">UPIIP</option>
<option value="UNAM">UNAM</option>

</select>
</div>

</div>

<button type="submit" class="btn-primario">
Registrate
</button>

</form>

<div class="formulario-aviso">
Una vez registrado, podrás iniciar sesión con tu correo y contraseña
</div>

</section>

</main>

</body>
</html>
